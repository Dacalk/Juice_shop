# fly.toml app configuration file generated for juice-bar-backend

app = 'juice-bar-backend'
primary_region = 'sea'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'
  DATABASE_PATH = '/data/pos.db'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = 'pos_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory_mb = 512
